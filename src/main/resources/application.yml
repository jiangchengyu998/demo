spring:
  application:
    name: ${SPRING_APPLICATION_NAME:cloud-deploy-demo}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://192.168.50.18:3306/cloud_deploy_demo?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  opentelemetry:
    resource-attributes:
      service.name: ${spring.application.name}
      deployment.environment: ${DEPLOYMENT_ENVIRONMENT:local}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://opentelemetry-collector.observability.svc.cluster.local:4318/v1/traces}

app:
  otel:
    debug-logging:
      enabled: ${OTEL_DEBUG_LOGGING_ENABLED:true}

logging:
  level:
    com.example.demo.observability: ${APP_OBSERVABILITY_LOG_LEVEL:INFO}
    io.micrometer.tracing: ${MICROMETER_TRACING_LOG_LEVEL:INFO}
    io.opentelemetry.exporter: ${OTEL_EXPORTER_LOG_LEVEL:DEBUG}
    io.opentelemetry.sdk.trace.export: ${OTEL_SDK_TRACE_EXPORT_LOG_LEVEL:DEBUG}

info:
  app:
    name: ${spring.application.name}
    description: Spring Boot CRUD demo for cloud one-click deployment
