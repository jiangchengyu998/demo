# Application configuration converted from application.properties to YAML
# Keep this file under src/main/resources so Spring Boot will pick it up.

spring:
  application:
    name: demo
  mvc:
    # Disable logging of resolved exceptions in Spring MVC
    log-resolved-exception: false

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        # Expose specific actuator endpoints
        include:
          - prometheus
          - health
          - info
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: demo

