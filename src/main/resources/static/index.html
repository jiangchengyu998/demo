<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>云朵平台 Java Demo</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f9fc;
      --panel: #ffffff;
      --text: #172033;
      --muted: #62708a;
      --line: #d9e1ee;
      --primary: #1769e0;
      --primary-hover: #1157bd;
      --accent: #15a36d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(23, 105, 224, 0.08), rgba(21, 163, 109, 0.06)),
        var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    main {
      width: min(720px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 40px;
      box-shadow: 0 18px 50px rgba(23, 32, 51, 0.08);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.2;
      font-weight: 750;
    }

    p {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 6px;
      font-weight: 700;
      text-decoration: none;
    }

    .primary {
      color: #ffffff;
      background: var(--primary);
    }

    .primary:hover {
      background: var(--primary-hover);
    }

    .secondary {
      color: var(--text);
      border: 1px solid var(--line);
      background: #ffffff;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 32px;
    }

    .meta div {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .meta strong {
      display: block;
      margin-bottom: 4px;
      color: var(--text);
      font-size: 15px;
    }

    @media (max-width: 640px) {
      main {
        padding: 28px 20px;
      }

      h1 {
        font-size: 28px;
      }

      .meta {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<main>
  <p class="eyebrow">Cloud Deploy Java Demo</p>
  <h1>云朵平台 Java Spring Boot Demo</h1>
  <p>
    这是用于云朵一键部署平台的 Java 示例应用，包含一个标准的 Spring Boot CRUD 接口，
    并接入 MySQL、Swagger/OpenAPI、Actuator、Prometheus 和 OpenTelemetry。
  </p>

  <div class="actions">
    <a class="primary" href="/swagger-ui.html">打开 Swagger</a>
    <a class="secondary" href="/actuator/health">查看健康检查</a>
  </div>

  <section class="meta" aria-label="Demo capabilities">
    <div>
      <strong>CRUD API</strong>
      /api/items
    </div>
    <div>
      <strong>Metrics</strong>
      /actuator/prometheus
    </div>
    <div>
      <strong>Tracing</strong>
      OTEL OTLP
    </div>
  </section>
</main>
</body>
</html>
