spring:
  datasource:
    url: jdbc:h2:mem:cloud_deploy_demo;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

management:
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
